<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사무실 먼지 소멸 대작전</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');

        :root {
            --primary-green: #1b4332;
            --point-green: #2d6a4f;
            --dust-red: #e63946;
            --bg-color: #f8f9fa;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; user-select: none;
        }

        /* [1] 오프닝 화면 - 처음부터 보이게 설정 */
        #opening-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary-green) 0%, #081c15 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; color: white; text-align: center;
        }

        #opening-screen h1 {
            font-size: 3.5rem; font-weight: 900; margin: 0;
            line-height: 1.2; letter-spacing: -2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #opening-screen p { font-size: 1.2rem; margin: 25px 0 40px; opacity: 0.8; }

        .start-btn {
            padding: 22px 60px; font-size: 1.6rem; font-weight: 800;
            background: #fff; color: var(--primary-green); border: none;
            border-radius: 50px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .start-btn:hover { transform: scale(1.1) rotate(-2deg); background: #d8f3dc; }

        /* [2] 게임 메인 UI - 처음엔 숨김 */
        #game-main {
            display: none; /* 시작 버튼 누르면 flex로 변경 */
            flex-direction: column; align-items: center;
            width: 100%; height: 100%; padding-top: 30px;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' style='font-size:40px'><text y='40'>🧽</text></svg>") 20 20, auto;
        }

        .status-bar { text-align: center; margin-bottom: 25px; }
        .timer-bg { width: 500px; height: 14px; background: #dee2e6; border-radius: 10px; margin: 15px auto; overflow: hidden; border: 3px solid #fff; }
        #timer-fill { width: 100%; height: 100%; background: var(--point-green); transition: width 1s linear; }

        .game-container { display: flex; gap: 30px; justify-content: center; }
        .canvas {
            position: relative; width: 500px; height: 500px;
            background: white; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 8px solid white;
            overflow: hidden;
        }
        .label { position: absolute; top: 15px; left: 15px; padding: 6px 15px; border-radius: 20px; color: white; font-size: 13px; font-weight: bold; z-index: 100; }

        /* [3] 일러스트 SVG 스타일 */
        svg { width: 100%; height: 100%; display: block; }
        .stain-group { cursor: pointer; }
        .hitbox { fill: transparent; pointer-events: all; }
        .stain-art { transition: opacity 0.4s; pointer-events: none; }
        .found .stain-art { opacity: 0 !important; }

        /* [4] 결과창 */
        #result-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-card {
            background: white; padding: 50px; border-radius: 40px; text-align: center;
            max-width: 500px; border-top: 10px solid var(--point-green);
        }
        .cta-link {
            display: inline-block; margin-top: 30px; padding: 20px 45px;
            background: var(--point-green); color: white; text-decoration: none;
            border-radius: 40px; font-weight: bold; font-size: 1.3rem; transition: 0.3s;
        }
        .cta-link:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .sparkle { position: absolute; pointer-events: none; animation: sparkleAni 0.6s forwards; font-size: 30px; z-index: 1000; }
        @keyframes sparkleAni { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2) translateY(-40px); opacity: 0; } }
    </style>
</head>
<body>

    <!-- 오프닝 화면 -->
    <div id="opening-screen">
        <h1>사무실 먼지<br>소멸 대작전!</h1>
        <p>우리 사무실 곳곳에 숨은 8개의 오염을 찾아<br>스펀지로 깨끗하게 닦아주세요!</p>
        <button class="start-btn" onclick="handleStart()">GAME START</button>
    </div>

    <!-- 게임 본체 -->
    <div id="game-main">
        <div class="status-bar">
            <h2 style="margin:0; color:#333;">🔍 숨겨진 오염 8곳을 찾아라!</h2>
            <div class="timer-bg"><div id="timer-fill"></div></div>
            <div style="font-size: 1.2rem; font-weight: bold; color: #444;">
                남은 오염: <span id="count-num" style="color:var(--dust-red)">8</span> / 8 | 시간: <span id="time-txt">03:00</span>
            </div>
        </div>

        <div class="game-container">
            <!-- 왼쪽: 깨끗한 방 -->
            <div class="canvas">
                <div class="label" style="background:#6c757d;">CLEAN OFFICE</div>
                <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#926c4d" /><stop offset="100%" style="stop-color:#6d4c41" />
                        </linearGradient>
                    </defs>
                    <!-- 배경 -->
                    <rect width="500" height="500" fill="#f1f5f9"/>
                    <rect y="380" width="500" height="120" fill="#e2e8f0"/>
                    <!-- 카펫 -->
                    <rect x="40" y="410" width="420" height="70" rx="20" fill="#cbd5e1"/>
                    <!-- 창문 -->
                    <rect x="300" y="50" width="150" height="110" rx="5" fill="#fff" stroke="#94a3b8" stroke-width="4"/>
                    <rect x="305" y="55" width="140" height="100" fill="#f0f9ff"/>
                    <!-- 책상 -->
                    <rect x="30" y="250" width="220" height="15" rx="5" fill="url(#deskGrad)"/>
                    <rect x="50" y="265" width="10" height="115" fill="#5d4037"/>
                    <rect x="210" y="265" width="10" height="115" fill="#5d4037"/>
                    <!-- 화분 -->
                    <rect x="200" y="195" width="35" height="40" rx="5" fill="#d4a373"/>
                    <path d="M217 195 Q240 150 260 170 Q217 185 217 195 Z" fill="#2d6a4f"/>
                    <path d="M217 195 Q190 140 175 175 Q217 185 217 195 Z" fill="#409167"/>
                    <!-- 소파 -->
                    <rect x="270" y="260" width="200" height="120" rx="20" fill="#475569"/>
                    <rect x="270" y="320" width="200" height="50" rx="10" fill="#334155"/>
                    <!-- 의자 -->
                    <rect x="90" y="340" width="80" height="8" rx="4" fill="#1e293b"/>
                    <rect x="125" y="290" width="10" height="50" fill="#334155"/>
                    <rect x="85" y="270" width="90" height="20" rx="8" fill="#334155"/>
                    <rect x="95" y="200" width="70" height="70" rx="15" fill="#334155"/>
                </svg>
            </div>

            <!-- 오른쪽: 오염된 방 (게임 플레이 영역) -->
            <div class="canvas" id="dirty-canvas">
                <div class="label" style="background:var(--dust-red)">DIRTY OFFICE (클릭!)</div>
                <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <!-- 배경과 가구는 왼쪽과 동일 -->
                    <rect width="500" height="500" fill="#f1f5f9"/>
                    <rect y="380" width="500" height="120" fill="#e2e8f0"/>
                    <rect x="40" y="410" width="420" height="70" rx="20" fill="#cbd5e1"/>
                    <rect x="300" y="50" width="150" height="110" rx="5" fill="#fff" stroke="#94a3b8" stroke-width="4"/>
                    <rect x="305" y="55" width="140" height="100" fill="#f0f9ff"/>
                    <rect x="30" y="250" width="220" height="15" rx="5" fill="url(#deskGrad)"/>
                    <rect x="50" y="265" width="10" height="115" fill="#5d4037"/>
                    <rect x="210" y="265" width="10" height="115" fill="#5d4037"/>
                    <rect x="200" y="195" width="35" height="40" rx="5" fill="#d4a373"/>
                    <path d="M217 195 Q240 150 260 170 Q217 185 217 195 Z" fill="#2d6a4f"/>
                    <path d="M217 195 Q190 140 175 175 Q217 185 217 195 Z" fill="#409167"/>
                    <rect x="270" y="260" width="200" height="120" rx="20" fill="#475569"/>
                    <rect x="270" y="320" width="200" height="50" rx="10" fill="#334155"/>
                    <rect x="90" y="340" width="80" height="8" rx="4" fill="#1e293b"/>
                    <rect x="125" y="290" width="10" height="50" fill="#334155"/>
                    <rect x="85" y="270" width="90" height="20" rx="8" fill="#334155"/>
                    <rect x="95" y="200" width="70" height="70" rx="15" fill="#334155"/>

                    <!-- [오염 요소 8개 및 히트박스] -->
                    <!-- 1. 카펫 위 커피 얼룩 -->
                    <g class="stain-group">
                        <rect class="hitbox" x="250" y="410" width="120" height="60" />
                        <path class="stain-art" d="M280 435 Q310 420 340 430 T390 450 Q340 470 280 455 Z" fill="#5d4037" opacity="0.8"/>
                    </g>
                    <!-- 2. 소파 시트 사이 부스러기 -->
                    <g class="stain-group">
                        <rect class="hitbox" x="300" y="310" width="120" height="50" />
                        <g class="stain-art">
                            <circle cx="320" cy="330" r="4" fill="#a1887f"/><circle cx="345" cy="335" r="3" fill="#a1887f"/><circle cx="370" cy="325" r="4" fill="#a1887f"/>
                        </g>
                    </g>
                    <!-- 3. 의자 등받이 오염 -->
                    <g class="stain-group">
                        <rect class="hitbox" x="90" y="200" width="80" height="70" />
                        <ellipse class="stain-art" cx="130" cy="235" rx="25" ry="20" fill="rgba(0,0,0,0.4)" />
                    </g>
                    <!-- 4. 창틀 꽃가루 먼지 -->
                    <g class="stain-group">
                        <rect class="hitbox" x="300" y="140" width="150" height="40" />
                        <rect class="stain-art" x="305" y="152" width="140" height="8" fill="#facc15" opacity="0.8"/>
                    </g>
                    <!-- 5. 바닥 구석 먼지 뭉치 -->
                    <g class="stain-group">
                        <rect class="hitbox" x="10" y="380" width="80" height="80" />
                        <circle class="stain-art" cx="60" cy="425" r="15" fill="#94a3b8" opacity="0.6"/>
                    </g>
                    <!-- 6. 책상 위 컵 자국 -->
                    <g class="stain-group">
                        <rect class="hitbox" x="150" y="240" width="60" height="40" />
                        <circle class="stain-art" cx="180" cy="255" r="12" fill="none" stroke="#4e342e" stroke-width="3" opacity="0.5"/>
                    </g>
                    <!-- 7. 소파 팔걸이 얼룩 -->
                    <g class="stain-group">
                        <rect class="hitbox" x="430" y="260" width="45" height="80" />
                        <ellipse class="stain-art" cx="450" cy="290" rx="12" ry="20" fill="#3e2723" opacity="0.6"/>
                    </g>
                    <!-- 8. 화분 옆 흙/먼지 -->
                    <g class="stain-group">
                        <rect class="hitbox" x="170" y="220" width="40" height="40" />
                        <circle class="stain-art" cx="190" cy="245" r="5" fill="#5d4037" /><circle class="stain-art" cx="205" cy="248" r="3" fill="#5d4037"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-modal">
        <div class="modal-card">
            <h2 id="res-title" style="font-size: 2.5rem; color: var(--point-green); margin-top:0;">✨ 완벽 소멸 완료!</h2>
            <p style="font-size: 1.2rem; line-height: 1.6; color: #333;">
                눈에 보이는 먼지 8개를 모두 닦아냈습니다!<br>
                하지만 카펫 섬유 깊숙한 곳의 <b>20만 마리 세균</b>은<br>
                일반적인 청소로는 절대 사라지지 않습니다.
            </p>
            <p style="color: #666;">이번 봄, 진짜 깨끗한 사무실을 만들어보세요.</p>
            <a href="https://www.letus4u.com/" class="cta-link">사무실 먼지 소멸하러 가기 🚀</a>
        </div>
    </div>

    <script>
        let foundCount = 0;
        let timeLeft = 180;
        let timerId = null;

        // [1] 게임 시작 함수
        function handleStart() {
            document.getElementById('opening-screen').style.display = 'none';
            document.getElementById('game-main').style.display = 'flex';
            startTimer();
        }

        // [2] 타이머 로직
        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('time-txt').innerText = `${min}:${sec < 10 ? '0' + sec : sec}`;
                document.getElementById('timer-fill').style.width = (timeLeft / 180) * 100 + '%';

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    showResult(false);
                }
            }, 1000);
        }

        // [3] 클릭 이벤트 (히트박스 감지)
        document.querySelectorAll('#dirty-canvas .stain-group').forEach(el => {
            el.addEventListener('mousedown', function(e) {
                if (this.classList.contains('found')) return;

                this.classList.add('found');
                foundCount++;
                document.getElementById('count-num').innerText = 8 - foundCount;

                // 클릭 이펙트 생성
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerText = '✨';
                sparkle.style.left = e.pageX + 'px';
                sparkle.style.top = e.pageY + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 600);

                if (foundCount === 8) {
                    clearInterval(timerId);
                    setTimeout(() => showResult(true), 500);
                }
            });
        });

        // [4] 결과창 표시
        function showResult(isWin) {
            document.getElementById('result-modal').style.display = 'flex';
            if (!isWin) {
                document.getElementById('res-title').innerText = "시간 초과! ⏰";
                document.getElementById('res-title').style.color = "#e63946";
            }
        }
    </script>
</body>
</html>
