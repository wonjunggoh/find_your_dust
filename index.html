<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사무실 먼지 소멸 대작전!</title>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #e74c3c;
            --bg: #f0f4f8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' style='font-size:30px'><text y='30'>🧽</text></svg>"), auto;
        }

        #header { text-align: center; padding: 20px; }
        .timer-container { width: 400px; height: 10px; background: #ddd; border-radius: 5px; margin: 10px auto; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--primary); transition: width 1s linear; }

        #game-board { display: flex; gap: 20px; justify-content: center; padding: 20px; flex-wrap: wrap; }
        .canvas-container { position: relative; width: 450px; height: 450px; background: white; border: 5px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        svg { width: 100%; height: 100%; display: block; }
        
        /* 틀린 부분 (오염) 설정 */
        .stain { cursor: pointer; transition: opacity 0.3s; fill-opacity: 0.8; }
        .stain:hover { fill-opacity: 1; }
        .found { opacity: 0 !important; pointer-events: none; }

        /* 결과 창 */
        #modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:40px; border-radius:20px; text-align:center; max-width:500px; animation: slideUp 0.5s; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .btn { background: var(--primary); color: white; padding: 15px 30px; border: none; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
        .btn:hover { background: #1b5e20; transform: translateY(-2px); }
        .score { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 15px 0; }
    </style>
</head>
<body>

<div id="header">
    <h1>🔍 우리 사무실, 정말 깨끗할까요?</h1>
    <p>오른쪽 그림에서 <b>카펫과 패브릭에 숨겨진 5개의 오염</b>을 찾아 스폰지로 닦아주세요!</p>
    <div class="timer-container"><div id="timer-bar"></div></div>
    <div>남은 오염: <span id="count">5</span>개 / 제한시간: <span id="time-text">03:00</span></div>
</div>

<div id="game-board">
    <!-- 왼쪽: 깨끗한 사무실 (정답용) -->
    <div class="canvas-container">
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <!-- 배경 & 벽 -->
            <rect width="400" height="400" fill="#f9f9f9"/>
            <rect width="400" height="150" fill="#e3f2fd"/>
            <!-- 창문 -->
            <rect x="50" y="30" width="80" height="60" fill="#fff" stroke="#90caf9" stroke-width="4"/>
            <line x1="90" y1="30" x2="90" y2="90" stroke="#90caf9" stroke-width="2"/>
            <!-- 카펫 -->
            <rect x="50" y="280" width="300" height="100" rx="20" fill="#cfd8dc"/>
            <!-- 사무용 의자 -->
            <rect x="150" y="220" width="100" height="10" rx="5" fill="#455a64"/> <!-- 의자 등받이 하단 -->
            <rect x="160" y="150" width="80" height="70" rx="10" fill="#546e7a"/> <!-- 의자 등받이 -->
            <rect x="150" y="230" width="100" height="60" rx="10" fill="#546e7a"/> <!-- 의자 시트 -->
            <rect x="195" y="290" width="10" height="40" fill="#37474f"/> <!-- 의자 다리 -->
            <rect x="160" y="330" width="80" height="5" fill="#37474f"/> <!-- 의자 바닥바 -->
            <!-- 책상 일부 -->
            <rect x="0" y="200" width="120" height="15" fill="#8d6e63"/>
            <rect x="20" y="215" width="10" height="80" fill="#6d4c41"/>
        </svg>
        <div style="position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.8); padding:5px 10px; border-radius:15px; font-size:12px;">CLEAN OFFICE</div>
    </div>

    <!-- 오른쪽: 오염된 사무실 (게임용) -->
    <div class="canvas-container" id="right-container">
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <!-- 배경 & 벽 -->
            <rect width="400" height="400" fill="#f9f9f9"/>
            <rect width="400" height="150" fill="#e3f2fd"/>
            <!-- 창문 -->
            <rect x="50" y="30" width="80" height="60" fill="#fff" stroke="#90caf9" stroke-width="4"/>
            <line x1="90" y1="30" x2="90" y2="90" stroke="#90caf9" stroke-width="2"/>
            <!-- 카펫 -->
            <rect x="50" y="280" width="300" height="100" rx="20" fill="#cfd8dc"/>
            <!-- 사무용 의자 -->
            <rect x="150" y="220" width="100" height="10" rx="5" fill="#455a64"/>
            <rect x="160" y="150" width="80" height="70" rx="10" fill="#546e7a"/>
            <rect x="150" y="230" width="100" height="60" rx="10" fill="#546e7a"/>
            <rect x="195" y="290" width="10" height="40" fill="#37474f"/>
            <rect x="160" y="330" width="80" height="5" fill="#37474f"/>
            <!-- 책상 -->
            <rect x="0" y="200" width="120" height="15" fill="#8d6e63"/>
            <rect x="20" y="215" width="10" height="80" fill="#6d4c41"/>

            <!-- [틀린그림찾기 요소 - 클릭 대상] -->
            <!-- 1. 의자 등받이 얼룩 -->
            <ellipse class="stain" data-id="1" cx="190" cy="180" rx="15" ry="10" fill="#3e2723" />
            <!-- 2. 카펫 커피 얼룩 (난이도 중) -->
            <path class="stain" data-id="2" d="M280 320 Q290 310 310 325 T340 330 Q320 350 290 345 Z" fill="#5d4037" />
            <!-- 3. 창문틀 미세먼지 (난이도 상) -->
            <rect class="stain" data-id="3" x="50" y="85" width="80" height="5" fill="#78909c" />
            <!-- 4. 카펫 구석 과자 부스러기 (난이도 하) -->
            <circle class="stain" data-id="4" cx="80" cy="350" r="5" fill="#bf360c" />
            <circle class="stain" data-id="4" cx="90" cy="355" r="3" fill="#bf360c" />
            <!-- 5. 의자 시트 사이 먼지 (난이도 상) -->
            <rect class="stain" data-id="5" x="160" y="230" width="80" height="4" fill="#263238" />
        </svg>
        <div style="position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.8); padding:5px 10px; border-radius:15px; font-size:12px; color:red;">DIRTY OFFICE</div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h2 id="modal-title">🎉 미션 완료!</h2>
        <div id="modal-body">
            <p>눈에 보이는 큰 오염물질 5개를 모두 닦아냈습니다!</p>
            <div class="score">하지만 알고 계셨나요?</div>
            <p>카펫 1제곱인치에는 변기 시트보다 4,000배 많은<br><b>200,000마리의 세균</b>이 여전히 숨어있습니다.</p>
            <p>겉만 닦는 청소로는 부족합니다.</p>
            <a href="https://www.letus4u.com/" class="btn">사무실 먼지 완전 소멸하기 🚀</a>
        </div>
    </div>
</div>

<script>
    let foundCount = 0;
    const totalCount = 5;
    let timeLeft = 180;
    const timerBar = document.getElementById('timer-bar');
    const countText = document.getElementById('count');
    const timeText = document.getElementById('time-text');
    const modal = document.getElementById('modal');

    // 타이머 함수
    const timer = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timeText.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        const percentage = (timeLeft / 180) * 100;
        timerBar.style.width = percentage + '%';

        if (timeLeft <= 0) {
            clearInterval(timer);
            showResult(false);
        }
    }, 1000);

    // 오염 클릭 이벤트
    document.querySelectorAll('.stain').forEach(el => {
        el.addEventListener('click', function() {
            if (!this.classList.contains('found')) {
                const id = this.getAttribute('data-id');
                // 같은 ID를 가진 모든 요소(부스러기 등)를 숨김
                document.querySelectorAll(`.stain[data-id="${id}"]`).forEach(s => s.classList.add('found'));
                
                foundCount++;
                countText.textContent = totalCount - foundCount;

                if (foundCount === totalCount) {
                    clearInterval(timer);
                    showResult(true);
                }
            }
        });
    });

    function showResult(isWin) {
        modal.style.display = 'flex';
        if (!isWin) {
            document.getElementById('modal-title').textContent = "⏰ 시간 초과!";
            document.getElementById('modal-body').innerHTML = `
                <p>보이지 않는 먼지들이 공기 중으로 다시 떠올랐습니다.</p>
                <div class="score">전문적인 관리가 필요할 때입니다!</div>
                <a href="https://www.letus4u.com/" class="btn">우리 사무실 케어 받기 🚀</a>
            `;
        }
    }
</script>

</body>
</html>
