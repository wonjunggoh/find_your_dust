<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🫧사무실 먼지 소멸 대작전🫧</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');

        :root {
            --letus-orange: #ff5c39;
            --letus-bg: #f4f6f9;
            --dust-red: #e74c3c;
            --text-dark: #2d3436;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--letus-bg);
            overflow: hidden; user-select: none;
        }

        /* [1] 오프닝 화면 */
        #opening-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center;
            background-image: radial-gradient(#eee 1px, transparent 1px);
            background-size: 15px 15px;
        }

        #opening-screen h1 {
            font-size: 3.6rem; font-weight: 900; margin: 0;
            color: var(--letus-orange);
            line-height: 1.1; letter-spacing: -3px;
        }

        #opening-screen p { font-size: 1.5rem; margin: 30px 0 60px; color: #555; font-weight: 500; }

        .start-btn {
            padding: 25px 90px; font-size: 1.7rem; font-weight: 900;
            background: var(--letus-orange); color: white; border: none;
            border-radius: 60px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 35px rgba(255, 92, 57, 0.4);
        }
        .start-btn:hover { transform: translateY(-5px); filter: brightness(1.1); }

        /* [2] 게임 메인 UI */
        #game-main {
            display: none; flex-direction: column; align-items: center;
            width: 100%; height: 100%; padding-top: 15px;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' style='font-size:30px'><text y='32'>🧽</text></svg>") 20 20, auto;
        }

        .status-bar { text-align: center; margin-bottom: 15px; background: white; padding: 12px 40px; border-radius: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.06); }
        .timer-bg { width: 500px; height: 14px; background: #eee; border-radius: 10px; margin: 8px auto; overflow: hidden; border: 3px solid #fff; }
        #timer-fill { width: 100%; height: 100%; background: var(--letus-orange); transition: width 1s linear; }

        .game-container { display: flex; gap: 20px; justify-content: center; }
        .canvas {
            position: relative; width: 600px; height: 500px;
            background: white; border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); border: 12px solid white;
            overflow: hidden;
        }
        .label { position: absolute; top: 20px; left: 20px; padding: 7px 18px; border-radius: 20px; color: white; font-size: 13px; font-weight: bold; z-index: 100; letter-spacing: 1px; box-shadow: 0 3px 10px rgba(0,0,0,0.2);}

        /* [3] 일러스트 및 오염 스타일 */
        svg { width: 100%; height: 100%; display: block; }
        .stain-group { cursor: pointer; }
        .hitbox { fill: transparent; pointer-events: all; stroke: transparent; stroke-width: 30px; }
        .stain-art { transition: all 0.5s ease-out; pointer-events: none; transform-origin: center; }
        .found .stain-art { opacity: 0 !important; transform: scale(0) rotate(20deg); }

        /* [4] 결과창 (와이드 직사각형으로 수정) */
        #result-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-card { 
            background: white; padding: 50px 60px; border-radius: 40px; text-align: center; 
            max-width: 650px; /* 와이드하게 변경 */
            width: 90%;
            border-top: 15px solid var(--letus-orange); animation: modalUp 0.6s ease-out; 
        }
        @keyframes modalUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 가격표 스타일 추가 */
        .price-table {
            background: #f8f9fa; border-radius: 20px; padding: 25px;
            margin: 25px 0; border: 1px solid #eee; text-align: left;
        }
        .price-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #eee;
        }
        .price-row:last-child { border-bottom: none; }
        .price-label { font-weight: 700; color: #444; }
        .price-value { text-align: right; }
        .old-p { text-decoration: line-through; color: #adb5bd; font-size: 0.9rem; margin-right: 10px; }
        .new-p { font-weight: 900; color: var(--letus-orange); font-size: 1.2rem; }

        .ticket-badge {
            display: inline-block; background: #fff0ed; color: var(--letus-orange);
            padding: 8px 20px; border-radius: 50px; font-weight: 900; font-size: 1rem;
            margin-bottom: 20px;
        }

        .cta-link { display: inline-block; margin-top: 20px; padding: 20px 60px; background: var(--text-dark); color: white; text-decoration: none; border-radius: 60px; font-weight: 900; font-size: 1.3rem; transition: 0.3s; }
        .cta-link:hover { transform: scale(1.05); }

        .sparkle { position: absolute; pointer-events: none; animation: sparkleAni 0.7s forwards; font-size: 40px; z-index: 1000; }
        @keyframes sparkleAni { 
            0% { transform: scale(0); opacity: 1; } 
            60% { transform: scale(1.6) translateY(-25px); opacity: 1; }
            100% { transform: scale(1) translateY(-60px) rotate(20deg); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div id="opening-screen">
        <h1>🫧사무실 먼지<br>소멸 대작전🫧</h1>
        <p>사무실 곳곳에 숨은 8개의 오염을 찾아 소멸시켜주세요!<br>참여하신 모든 분께 <b>'레터스 얼리버드 티켓'</b> 응모 기회를 드립니다.</p>
        <button class="start-btn" onclick="handleStart()">GAME START</button>
    </div>

    <div id="game-main">
        <div class="status-bar">
            <h2 style="margin:0; color:#333; font-weight: 900;">🔍 보이지 않는 오염 8곳을 찾아라!</h2>
            <div class="timer-bg"><div id="timer-fill"></div></div>
            <div style="font-size: 1.2rem; font-weight: bold; color: #444;">
                남은 오염: <span id="count-num" style="color:var(--letus-orange); font-weight: 900; font-size: 1.5rem;">8</span> / 8 | 시간: <span id="time-txt">03:00</span>
            </div>
        </div>

        <div class="game-container">
            <div class="canvas">
                <div class="label" style="background:#808e9b;">CLEAN OFFICE</div>
                <svg id="clean-svg" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
            <div class="canvas" id="dirty-canvas">
                <div class="label" style="background:var(--dust-red)">DIRTY OFFICE (클릭!)</div>
                <svg id="dirty-svg" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        </div>
    </div>

    <div id="result-modal">
        <div class="modal-card" id="modal-content-box"></div>
    </div>

    <script>
        const officeSVG = `
            <defs>
                <linearGradient id="wallGrade" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#f9f9f9" />
                    <stop offset="100%" style="stop-color:#e0e3e6" />
                </linearGradient>
                <linearGradient id="floorGrade" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#ced4da" />
                    <stop offset="100%" style="stop-color:#adb5bd" />
                </linearGradient>
            </defs>
            <rect width="600" height="500" fill="url(#wallGrade)"/>
            <rect y="380" width="600" height="120" fill="url(#floorGrade)"/>
            
            <rect x="350" y="40" width="180" height="130" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="4"/>
            <clipPath id="windowClip"><rect x="355" y="45" width="170" height="120" rx="8"/></clipPath>
            <g clip-path="url(#windowClip)">
                <rect x="355" y="45" width="170" height="120" fill="#e3f2fd"/>
                <path d="M350 165 L400 90 L460 140 L520 80 L560 165 Z" fill="#81c784"/>
                <path d="M380 165 L430 110 L480 150 L530 100 L580 165 Z" fill="#66bb6a" opacity="0.8"/>
                <path d="M355 45 Q400 30 430 45 T480 60 Q530 45 530 45" stroke="#90caf9" stroke-width="2" fill="none"/>
            </g>

            <rect x="50" y="410" width="500" height="75" rx="35" fill="#cfd8dc"/>

            <rect x="40" y="260" width="240" height="12" rx="4" fill="#8d6e63"/>
            <rect x="55" y="272" width="12" height="138" fill="#6d4c41"/>
            <rect x="255" y="272" width="12" height="138" fill="#6d4c41"/>
            
            <rect x="180" y="320" width="70" height="90" rx="5" fill="#ced4da"/>
            <line x1="185" y1="350" x2="245" y2="350" stroke="#adb5bd" stroke-width="2"/>
            <line x1="185" y1="380" x2="245" y2="380" stroke="#adb5bd" stroke-width="2"/>
            <circle cx="215" cy="340" r="3" fill="#495057"/>
            <circle cx="215" cy="370" r="3" fill="#495057"/>

            <rect x="80" y="190" width="100" height="60" rx="5" fill="#333"/>
            <linearGradient id="screenGrade" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#2c3e50" />
                <stop offset="100%" style="stop-color:#4ca1af" />
            </linearGradient>
            <rect x="85" y="195" width="90" height="50" rx="3" fill="url(#screenGrade)"/>
            <rect x="125" y="250" width="10" height="10" fill="#495057"/>
            <rect x="100" y="258" width="60" height="2" fill="#495057"/>

            <rect x="210" y="225" width="30" height="35" rx="5" fill="#d4a373"/>
            <path d="M225 225 Q250 180 270 200 Q225 215 225 225 Z" fill="#1b5e20"/>
            <path d="M225 225 Q200 170 185 205 Q225 215 225 225 Z" fill="#2e7d32"/>
            <circle cx="225" cy="210" r="3" fill="#ffeb3b" opacity="0.8"/>

            <rect x="70" y="280" width="100" height="25" rx="10" fill="#212529"/>
            <rect x="85" y="210" width="70" height="75" rx="15" fill="#212529"/>
            <rect x="115" y="305" width="10" height="105" fill="#495057"/>
            <path d="M70 410 L170 410" stroke="#212529" stroke-width="10" stroke-linecap="round"/>

            <rect x="320" y="270" width="230" height="120" rx="20" fill="#495057"/>
            <rect x="320" y="340" width="230" height="50" rx="10" fill="#343a40"/>
            <line x1="435" y1="270" x2="435" y2="340" stroke="#2c3e50" stroke-width="2"/>
        `;

        const stainsSVG = `
            <defs>
                <radialGradient id="coffeeStainGrade" cx="50%" cy="50%" r="50%">
                    <stop offset="10%" style="stop-color:#3e2723" />
                    <stop offset="60%" style="stop-color:#5d4037; stop-opacity:0.9" />
                    <stop offset="100%" style="stop-color:#6d4c41; stop-opacity:0.2" />
                </radialGradient>
                <radialGradient id="waterStainGrade" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#90caf9; stop-opacity:0.6" />
                    <stop offset="70%" style="stop-color:#adb5bd; stop-opacity:0.3" />
                    <stop offset="100%" style="stop-color:#e9ecef; stop-opacity:0.1" />
                </radialGradient>
            </defs>
            <g class="stain-group"><rect class="hitbox" x="350" y="415" width="150" height="60"/><path class="stain-art" d="M380 445 C385 448, 395 440, 410 425 C430 410, 460 420, 480 435 C495 450, 490 460, 470 470 C440 480, 410 475, 385 465 C370 455, 375 442, 380 445 Z" fill="url(#coffeeStainGrade)"/></g>
            <g class="stain-group"><rect class="hitbox" x="320" y="340" width="120" height="50"/><path class="stain-art" d="M340 365 C350 355, 360 360, 380 350 C400 340, 420 350, 430 365 C435 375, 425 385, 405 380 C380 375, 360 385, 345 375 C335 370, 335 368, 340 365 Z" fill="url(#waterStainGrade)"/></g>
            <g class="stain-group"><rect class="hitbox" x="80" y="210" width="80" height="80"/><ellipse class="stain-art" cx="120" cy="245" rx="30" ry="30" fill="rgba(0,0,0,0.5)"/></g>
            <g class="stain-group"><rect class="hitbox" x="350" y="150" width="180" height="25"/><rect class="stain-art" x="355" y="155" width="170" height="4" fill="#607d8b" opacity="0.8"/></g>
            <g class="stain-group"><rect class="hitbox" x="20" y="330" width="80" height="100"/><g class="stain-art"><circle cx="45" cy="385" r="3" fill="#111"/><circle cx="50" cy="388" r="3" fill="#111"/><circle cx="65" cy="390" r="3" fill="#111"/><circle cx="85" cy="382" r="3" fill="#111"/><circle cx="90" cy="385" r="3" fill="#111"/></g></g>
            <g class="stain-group"><rect class="hitbox" x="40" y="240" width="60" height="40"/><circle class="stain-art" cx="70" cy="255" r="14" fill="none" stroke="#3e2723" stroke-width="4" opacity="0.6"/></g>
            <g class="stain-group"><rect class="hitbox" x="510" y="280" width="50" height="80"/><ellipse class="stain-art" cx="530" cy="315" rx="15" ry="30" fill="#6d4c41" opacity="0.7"/></g>
            <g class="stain-group"><rect class="hitbox" x="180" y="235" width="50" height="50"/><circle class="stain-art" cx="205" cy="258" r="6" fill="#facc15"/><circle class="stain-art" cx="225" cy="260" r="4" fill="#facc15"/></g>
        `;

        document.getElementById('clean-svg').innerHTML = officeSVG;
        document.getElementById('dirty-svg').innerHTML = officeSVG + stainsSVG;

        let foundCount = 0;
        let timeLeft = 180;
        let timerId = null;

        function handleStart() {
            document.getElementById('opening-screen').style.display = 'none';
            document.getElementById('game-main').style.display = 'flex';
            startTimer();
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('time-txt').innerText = `${min}:${sec < 10 ? '0' + sec : sec}`;
                document.getElementById('timer-fill').style.width = (timeLeft / 180) * 100 + '%';
                
                if (timeLeft <= 30) { document.getElementById('timer-fill').style.background = '#e74c3c'; }
                if (timeLeft <= 0) { clearInterval(timerId); showResult(false); }
            }, 1000);
        }

        document.querySelectorAll('#dirty-svg .stain-group').forEach(el => {
            el.addEventListener('mousedown', function(e) {
                if (this.classList.contains('found')) return;
                this.classList.add('found');
                foundCount++;
                document.getElementById('count-num').innerText = 8 - foundCount;
                
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle'; sparkle.innerText = '🫧';
                sparkle.style.left = e.pageX + 'px'; sparkle.style.top = e.pageY + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 700);

                if (foundCount === 8) { clearInterval(timerId); setTimeout(() => showResult(true), 600); }
            });
        });

        // 결과창 표시 함수 (에어컨 프로모션으로 수정)
        function showResult(isWin) {
            document.getElementById('result-modal').style.display = 'flex';
            const modalBox = document.getElementById('modal-content-box');

            const commonPriceTable = `
                <div class="price-table">
                    <p style="font-weight:900; color:var(--letus-orange); margin-bottom:15px; font-size:0.95rem;">[티켓 당첨 시 적용되는 얼리버드 원가]</p>
                    <div class="price-row">
                        <span class="price-label">벽걸이형</span>
                        <div class="price-value"><span class="old-p">9.6만</span><span class="new-p">8.0만</span></div>
                    </div>
                    <div class="price-row">
                        <span class="price-label">천장형 1·2Way</span>
                        <div class="price-value"><span class="old-p">10.8만</span><span class="new-p">9.0만</span></div>
                    </div>
                    <div class="price-row">
                        <span class="price-label">천장형 4Way</span>
                        <div class="price-value"><span class="old-p">14.4만</span><span class="new-p">12.0만</span></div>
                    </div>
                    <p style="font-size:0.8rem; color:#888; margin-top:15px; text-align:center;">
                        *스탠드 등 전 모델 특별가 적용 가능 (건당 최대 30만 원 지원)
                    </p>
                </div>
            `;

            if (isWin) {
                modalBox.innerHTML = `
                    <div class="ticket-badge">LUCKY DRAW ENTRY 🎫</div>
                    <h2 style="font-size: 2.8rem; color: var(--letus-orange); margin-top:0; font-weight: 900; letter-spacing: -2px;">완벽하게 소멸 완료!</h2>
                    <p style="font-size: 1.15rem; line-height: 1.6; color: #333;">
                        축하합니다! 눈에 띄는 오염 8개를 모두 소멸시키셨네요.<br>
                        참여해주신 분 중 <b>추첨을 통해 서른 분</b>께<br>
                        레터스 마진 0%의 <b>'얼리버드 티켓'</b>을 보내드립니다.
                    </p>
                    ${commonPriceTable}
                    <p style="font-size: 1.1rem; color: #444; font-weight: bold;">
                        당첨 결과는 추첨 후 이메일로 개별 안내 드릴 예정입니다.<br>
                        상쾌한 오피스를 위한 가장 스마트한 준비를 시작해보세요!
                    </p>
                    <a href="#" class="cta-link" onclick="location.reload()">이벤트 응모 완료 ✅</a>
                `;
            } else {
                modalBox.innerHTML = `
                    <div class="ticket-badge">LUCKY DRAW ENTRY 🎫</div>
                    <h2 style="font-size: 2.8rem; color: var(--dust-red); margin-top:0; font-weight: 900; letter-spacing: -2px;">조금 아쉽네요!</h2>
                    <p style="font-size: 1.15rem; line-height: 1.6; color: #333;">
                        <b>총 ${foundCount}개</b>의 오염을 발견하셨습니다.<br>
                        찾지 못한 숨은 오염은 레터스가 다 찾아낼게요!<br>
                        걱정 마세요, <b>참여만으로도 응모는 완료되었습니다.</b>
                    </p>
                    ${commonPriceTable}
                    <p style="font-size: 1.1rem; color: #444; font-weight: bold;">
                        추첨을 통해 서른 분께 '레터스 얼리버드 티켓'을 드립니다.<br>
                        당첨 결과 메일을 조금만 기다려주세요!
                    </p>
                    <a href="#" class="cta-link" style="background:var(--dust-red)" onclick="location.reload()">이벤트 응모 완료 ✅</a>
                `;
            }
        }
    </script>
</body>
</html>
