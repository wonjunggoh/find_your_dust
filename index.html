<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사무실 먼지 소멸 대작전!</title>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            /* 스펀지 커서 크기 확대 */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' style='font-size:40px'><text y='40'>🧽</text></svg>") 20 20, auto;
            user-select: none;
        }

        #header { text-align: center; padding: 20px; }
        .timer-wrap { width: 500px; height: 12px; background: #ddd; border-radius: 6px; margin: 10px auto; overflow: hidden; border: 2px solid #fff; }
        #timer-bar { width: 100%; height: 100%; background: var(--primary); transition: width 1s linear; }

        #game-board { display: flex; gap: 20px; justify-content: center; padding: 20px; flex-wrap: wrap; }
        .container { position: relative; width: 500px; height: 500px; background: white; border: 5px solid #333; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 4px 12px; border-radius: 10px; font-size: 12px; z-index: 20; }

        svg { width: 100%; height: 100%; display: block; }

        /* 클릭 범위(Hitbox) 설정: 투명하지만 클릭 가능 */
        .stain-group { cursor: pointer; pointer-events: all; }
        .hitbox { fill: transparent; transition: fill 0.2s; }
        /* 디버깅용: 아래 주석을 풀면 클릭 범위를 눈으로 확인할 수 있습니다 */
        /* .hitbox { fill: rgba(255,0,0,0.2); } */

        .stain-art { transition: opacity 0.3s; pointer-events: none; }
        .found .stain-art { opacity: 0 !important; }
        .found { pointer-events: none; }

        /* 클릭 시 팡 터지는 효과 */
        .pop { position: absolute; pointer-events: none; animation: pop-ani 0.5s ease-out forwards; font-size: 30px; z-index: 100; }
        @keyframes pop-ani { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        /* 결과창 */
        #modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:40px; border-radius:25px; text-align:center; max-width:500px; }
        .btn { background: var(--primary); color: white; padding: 15px 35px; border: none; border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

<div id="header">
    <h1>🔍 사무실 먼지 소멸 작전</h1>
    <p>오른쪽 그림에서 <b>카펫과 소파의 오염 8곳</b>을 스펀지로 문질러주세요!</p>
    <div class="timer-wrap"><div id="timer-bar"></div></div>
    <div style="font-size: 1.2rem;">찾은 먼지: <strong id="found-count" style="color:var(--primary)">0</strong> / 8 | 남은 시간: <span id="time-text">03:00</span></div>
</div>

<div id="game-board">
    <!-- 왼쪽: 깨끗한 사무실 -->
    <div class="container">
        <div class="label">CLEAN OFFICE</div>
        <svg viewBox="0 0 500 500">
            <!-- 공통 배경 -->
            <rect width="500" height="500" fill="#f8f9fa"/>
            <rect y="350" width="500" height="150" fill="#e0e0e0"/> <!-- 바닥 -->
            <rect x="30" y="380" width="440" height="100" rx="20" fill="#cfd8dc"/> <!-- 카페트 -->
            <rect x="250" y="220" width="220" height="130" rx="10" fill="#90a4ae"/> <!-- 패브릭 소파 -->
            <rect x="250" y="310" width="220" height="40" rx="5" fill="#78909c"/> <!-- 소파 쿠션 -->
            <rect x="30" y="240" width="180" height="15" fill="#8d6e63"/> <!-- 책상 -->
            <rect x="50" y="200" width="140" height="100" rx="10" fill="#546e7a"/> <!-- 의자 -->
            <rect x="300" y="50" width="140" height="100" fill="white" stroke="#90caf9" stroke-width="3"/> <!-- 창문 -->
        </svg>
    </div>

    <!-- 오른쪽: 오염된 사무실 (게임 영역) -->
    <div class="container" id="game-area">
        <div class="label" style="background:var(--accent)">DIRTY OFFICE</div>
        <svg viewBox="0 0 500 500">
            <!-- 배경 (왼쪽과 동일) -->
            <rect width="500" height="500" fill="#f8f9fa"/>
            <rect y="350" width="500" height="150" fill="#e0e0e0"/>
            <rect x="30" y="380" width="440" height="100" rx="20" fill="#cfd8dc"/>
            <rect x="250" y="220" width="220" height="130" rx="10" fill="#90a4ae"/>
            <rect x="250" y="310" width="220" height="40" rx="5" fill="#78909c"/>
            <rect x="30" y="240" width="180" height="15" fill="#8d6e63"/>
            <rect x="50" y="200" width="140" height="100" rx="10" fill="#546e7a"/>
            <rect x="300" y="50" width="140" height="100" fill="white" stroke="#90caf9" stroke-width="3"/>

            <!-- 오염 8개 (클릭 범위 대폭 확대) -->
            
            <!-- 1. 카페트 위 큰 커피 얼룩 -->
            <g class="stain-group">
                <rect class="hitbox" x="300" y="380" width="120" height="80"/>
                <path class="stain-art" d="M320 420 Q340 400 380 410 T420 430 Q380 455 330 445 Z" fill="#5d4037"/>
            </g>

            <!-- 2. 카페트 구석 먼지 뭉치 -->
            <g class="stain-group">
                <rect class="hitbox" x="40" y="400" width="80" height="80"/>
                <circle class="stain-art" cx="70" cy="440" r="15" fill="#9e9e9e" opacity="0.7"/>
                <circle class="stain-art" cx="85" cy="445" r="10" fill="#9e9e9e" opacity="0.7"/>
            </g>

            <!-- 3. 소파 위 과자 부스러기 -->
            <g class="stain-group">
                <rect class="hitbox" x="280" y="270" width="100" height="60"/>
                <g class="stain-art">
                    <circle cx="310" cy="300" r="3" fill="#bf360c"/><circle cx="325" cy="305" r="4" fill="#bf360c"/><circle cx="340" cy="298" r="3" fill="#bf360c"/>
                </g>
            </g>

            <!-- 4. 소파 등받이 얼룩 -->
            <g class="stain-group">
                <rect class="hitbox" x="380" y="230" width="80" height="80"/>
                <ellipse class="stain-art" cx="420" cy="270" rx="20" ry="25" fill="#3e2723" opacity="0.5"/>
            </g>

            <!-- 5. 의자 등받이 오염 -->
            <g class="stain-group">
                <rect class="hitbox" x="70" y="210" width="100" height="60"/>
                <rect class="stain-art" x="80" y="220" width="80" height="40" rx="10" fill="rgba(0,0,0,0.4)"/>
            </g>

            <!-- 6. 창문틀 꽃가루 -->
            <g class="stain-group">
                <rect class="hitbox" x="300" y="140" width="140" height="40"/>
                <rect class="stain-art" x="300" y="145" width="140" height="8" fill="#fbc02d"/>
            </g>

            <!-- 7. 책상 위 커피 컵 자국 -->
            <g class="stain-group">
                <rect class="hitbox" x="140" y="220" width="60" height="50"/>
                <circle class="stain-art" cx="170" cy="235" r="12" fill="none" stroke="#4e342e" stroke-width="3" opacity="0.6"/>
            </g>

            <!-- 8. 바닥 구석의 머리카락/먼지 -->
            <g class="stain-group">
                <rect class="hitbox" x="10" y="330" width="80" height="50"/>
                <path class="stain-art" d="M20 355 Q40 345 60 360 M30 365 Q50 355 70 370" stroke="#424242" fill="none" stroke-width="2"/>
            </g>
        </svg>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h2>🎉 미션 완료!</h2>
        <p>눈에 보이는 오염 8개를 모두 제거했습니다!<br>하지만 카펫 섬유 속에는 아직 <b>20만 마리의 세균</b>이 살고 있다는 사실, 알고 계셨나요?</p>
        <p>전문적인 장비만이 소재 안쪽의 먼지까지 해결할 수 있습니다.</p>
        <a href="https://www.letus4u.com/" class="btn">사무실 먼지 소멸하기 🚀</a>
    </div>
</div>

<script>
    let found = 0;
    const total = 8;
    let time = 180;

    // 타이머 로직
    const timer = setInterval(() => {
        time--;
        const m = Math.floor(time/60);
        const s = time%60;
        document.getElementById('time-text').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        document.getElementById('timer-bar').style.width = (time/180)*100 + '%';
        if(time <= 0) { clearInterval(timer); showModal(false); }
    }, 1000);

    // 클릭 이벤트 로직
    document.querySelectorAll('.stain-group').forEach(el => {
        el.addEventListener('mousedown', function(e) {
            if(this.classList.contains('found')) return;

            // 성공 처리
            this.classList.add('found');
            found++;
            document.getElementById('found-count').innerText = found;

            // 효과 생성
            const effect = document.createElement('div');
            effect.className = 'pop';
            effect.innerText = '✨';
            effect.style.left = e.pageX - 15 + 'px';
            effect.style.top = e.pageY - 15 + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 500);

            if(found === total) {
                clearInterval(timer);
                setTimeout(() => showModal(true), 500);
            }
        });
    });

    function showModal(isWin) {
        document.getElementById('modal').style.display = 'flex';
        if(!isWin) {
            document.querySelector('#modal h2').innerText = "시간 초과! ⏰";
        }
    }
</script>

</body>
</html>
