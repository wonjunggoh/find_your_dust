<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letus - 숨은 오염 찾기 이벤트</title>
    <style>
        :root {
            --letus-orange: #FF5C00;
            --bg-gray: #F8F9FA;
            --text-dark: #1A1A1A;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-gray);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        /* 게임 컨테이너 */
        #game-container {
            width: 100%;
            max-width: 800px;
            position: relative;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 게임 이미지 영역 */
        #game-canvas {
            width: 100%;
            height: auto;
            display: block;
            cursor: crosshair;
        }

        /* 상단 UI */
        .game-header {
            padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .count-display {
            font-size: 1.1rem; font-weight: 700; color: var(--letus-orange);
        }

        /* 숨은 아이템 (실제 구현 시 좌표에 맞춰 배치) */
        .hidden-item {
            position: absolute;
            width: 40px; height: 40px;
            /* background: rgba(255, 92, 0, 0.2); // 테스트 시에만 켜주세요 */
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
        }

        .found-mark {
            position: absolute;
            width: 40px; height: 40px;
            border: 3px solid var(--letus-orange);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ping 0.5s ease-out;
        }

        @keyframes ping {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* 결과창 모달 스타일 */
        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        #modal-content-box {
            width: 90%;
            max-width: 520px;
            background: #ffffff;
            border-top: 8px solid var(--letus-orange);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: modalUp 0.4s ease-out;
        }

        @keyframes modalUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ticket-badge {
            display: inline-block;
            background: #FFF0E6;
            color: var(--letus-orange);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem; font-weight: 800;
            margin-bottom: 20px;
        }

        /* 가격표 테이블 */
        .price-table-container {
            background: #F9FAFB;
            border-radius: 16px;
            padding: 24px;
            margin: 25px 0;
            border: 1px solid #F1F3F5;
        }

        .price-table-title {
            font-size: 0.85rem; font-weight: 700; color: var(--letus-orange);
            margin-bottom: 15px; text-align: left;
        }

        .price-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #EEE;
        }

        .price-item:last-child { border-bottom: none; }

        .item-name { font-weight: 600; color: #343A40; font-size: 0.95rem; }

        .old-price { 
            text-decoration: line-through; color: #ADB5BD; 
            font-size: 0.85rem; margin-right: 8px;
        }

        .new-price { color: var(--text-dark); font-weight: 800; font-size: 1.1rem; }

        .modal-close-btn {
            width: 100%; background: var(--text-dark); color: white;
            padding: 16px; border: none; border-radius: 12px;
            font-weight: 700; font-size: 1rem; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="game-header">
        <span style="font-weight: 700;">사무실 속 숨은 오염 8개를 찾으세요!</span>
        <span class="count-display">찾은 오염: <span id="found-count">0</span> / 8</span>
    </div>
    
    <div style="position: relative;">
        <img src="https://via.placeholder.com/800x500/F2F2F2/999999?text=Office+Background+Image" id="game-canvas" alt="사무실 배경">
        
        <div class="hidden-item" style="top: 20%; left: 15%;" onclick="findItem(this)"></div>
        <div class="hidden-item" style="top: 45%; left: 30%;" onclick="findItem(this)"></div>
        <div class="hidden-item" style="top: 10%; left: 60%;" onclick="findItem(this)"></div>
        <div class="hidden-item" style="top: 80%; left: 10%;" onclick="findItem(this)"></div>
        <div class="hidden-item" style="top: 35%; left: 80%;" onclick="findItem(this)"></div>
        <div class="hidden-item" style="top: 65%; left: 50%;" onclick="findItem(this)"></div>
        <div class="hidden-item" style="top: 90%; left: 75%;" onclick="findItem(this)"></div>
        <div class="hidden-item" style="top: 25%; left: 45%;" onclick="findItem(this)"></div>
    </div>
</div>

<div id="result-modal">
    <div id="modal-content-box">
        </div>
</div>

<script>
    let foundCount = 0;
    const totalItems = 8;

    function findItem(element) {
        if (element.classList.contains('found')) return;

        element.classList.add('found');
        foundCount++;
        document.getElementById('found-count').innerText = foundCount;

        // 클릭 위치에 표시 남기기
        const mark = document.createElement('div');
        mark.className = 'found-mark';
        mark.style.top = element.style.top;
        mark.style.left = element.style.left;
        element.parentElement.appendChild(mark);

        // 모두 찾았을 때
        if (foundCount === totalItems) {
            setTimeout(() => showResult(true), 500);
        }
    }

    // 일정 시간이 지나면 자동으로 결과창 (실패 상황 등)
    // 예: 30초 뒤에 실패 결과 노출 로직이 필요하다면 추가

    function showResult(isSuccess) {
        const modal = document.getElementById('result-modal');
        const modalContent = document.getElementById('modal-content-box');
        
        modal.style.display = 'flex';

        const headerTitle = isSuccess ? "완벽하게 찾아내셨네요! 🔍" : "조금 어려우셨나요? 🧐";
        const subMessage = isSuccess 
            ? "눈에 띄는 오염은 모두 정복하셨습니다!<br>이제 보이지 않는 곳은 레터스가 책임질게요." 
            : "찾지 못한 숨은 오염은 레터스가 다 찾아낼게요!<br>걱정 마세요, 참여만으로도 응모는 완료되었습니다.";

        modalContent.innerHTML = `
            <div class="ticket-badge">LUCKY DRAW ENTRY 🎫</div>
            <h2 style="font-size: 1.6rem; color: #1A1A1A; margin-bottom: 12px; line-height: 1.3;">${headerTitle}</h2>
            <p style="color: #666; font-size: 0.95rem; line-height: 1.6; margin-bottom: 0;">${subMessage}</p>
            <p style="color: #1A1A1A; font-size: 0.95rem; font-weight: 700; margin-top: 5px;">
                추첨을 통해 서른 분께 '레터스 얼리버드 티켓'을 드립니다.
            </p>

            <div class="price-table-container">
                <p class="price-table-title">[티켓 당첨 시 적용되는 특별가]</p>
                <div class="price-item">
                    <span class="item-name">벽걸이형</span>
                    <div class="item-price-info">
                        <span class="old-price">9.6만</span>
                        <span class="new-price">8.0만</span>
                    </div>
                </div>
                <div class="price-item">
                    <span class="item-name">천장형 1·2Way</span>
                    <div class="item-price-info">
                        <span class="old-price">10.8만</span>
                        <span class="new-price">9.0만</span>
                    </div>
                </div>
                <div class="price-item">
                    <span class="item-name">천장형 4Way</span>
                    <div class="item-price-info">
                        <span class="old-price">14.4만</span>
                        <span class="new-price">12.0만</span>
                    </div>
                </div>
                <p style="font-size: 0.75rem; color: #999; margin-top: 15px; text-align: center;">
                    *스탠드 등 전 모델 특별가 적용 (건당 최대 30만 원 지원)
                </p>
            </div>

            <p style="font-size: 0.85rem; color: #666; margin-bottom: 25px;">
                당첨 결과는 <strong>추첨 후 기재하신 이메일로</strong><br>개별 안내 드릴 예정이니 조금만 기다려 주세요!
            </p>

            <button class="modal-close-btn" onclick="closeModal()">확인 완료</button>
        `;
    }

    function closeModal() {
        document.getElementById('result-modal').style.display = 'none';
        // 뉴스레터 본문으로 돌아가거나 서비스 페이지로 리다이렉트 하는 로직 추가 가능
    }
</script>

</body>
</html>
