<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🫧사무실 먼지 소멸 대작전🫧</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');

        :root {
            --letus-orange: #ff5c39;
            --letus-bg: #f4f6f9;
            --dust-red: #e74c3c;
            --text-dark: #2d3436;
        }

        body, html {
            margin: 0; padding: 0; width: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--letus-bg);
            overflow-x: hidden; 
            overflow-y: auto; 
            user-select: none;
        }

        #opening-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center;
            background-image: radial-gradient(#eee 1px, transparent 1px);
            background-size: 15px 15px; padding: 20px; box-sizing: border-box;
        }
        
        /* 🔥 제목 무조건 한 줄 유지 & 화면 비율로 크기 조절 */
        #opening-screen h1 { 
            font-size: 3.6rem; 
            font-weight: 900; margin: 0; color: var(--letus-orange); 
            line-height: 1.2; letter-spacing: -2px; 
            white-space: nowrap; /* 절대 줄바꿈 금지 */
        }
        
        #opening-screen p { 
            font-size: 1.2rem; margin: 25px 0 45px; color: #555; 
            font-weight: 500; line-height: 1.6; word-break: keep-all; 
        }
        
        .highlight-text { color: var(--letus-orange); font-weight: 800; border-bottom: 2px solid var(--letus-orange); }
        
        .start-btn { 
            padding: 18px 60px; font-size: 1.5rem; font-weight: 900; 
            background: var(--letus-orange); color: white; border: none; 
            border-radius: 60px; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 10px 20px rgba(255, 92, 57, 0.3); 
        }
        .start-btn:hover { transform: translateY(-5px); filter: brightness(1.1); }

        #game-main { 
            display: none; flex-direction: column; align-items: center; 
            width: 100%; min-height: 100vh; padding: 20px 0 50px 0; box-sizing: border-box;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' style='font-size:30px'><text y='32'>🧽</text></svg>") 20 20, auto; 
        }
        
        .status-bar { text-align: center; margin-bottom: 15px; background: white; padding: 12px 40px; border-radius: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.06); width: 90%; max-width: 600px; box-sizing: border-box; }
        .timer-bg { width: 100%; height: 14px; background: #eee; border-radius: 10px; margin: 8px auto; overflow: hidden; border: 3px solid #fff; }
        #timer-fill { width: 100%; height: 100%; background: var(--letus-orange); transition: width 1s linear; }
        
        .game-container { 
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; 
            width: 100%; max-width: 1250px; padding: 0 15px; box-sizing: border-box;
        }
        
        .canvas { 
            position: relative; width: 100%; max-width: 600px; aspect-ratio: 6 / 5;
            background: white; border-radius: 35px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            border: 8px solid white; overflow: hidden; box-sizing: border-box;
        }
        .label { position: absolute; top: 15px; left: 15px; padding: 7px 18px; border-radius: 20px; color: white; font-size: 13px; font-weight: bold; z-index: 100; letter-spacing: 1px; box-shadow: 0 3px 10px rgba(0,0,0,0.2);}

        #result-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 10000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-card { background: white; padding: 30px 40px; border-radius: 40px; text-align: center; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; border-top: 15px solid var(--letus-orange); animation: modalUp 0.6s ease-out; box-sizing: border-box; }
        @keyframes modalUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .price-table-container { background: #f8f9fa; border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px solid #eee; }
        .price-table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        .price-table th { padding: 10px; font-size: 0.9rem; color: #666; border-bottom: 2px solid #dee2e6; background: #fff; word-break: keep-all;}
        .price-table td { padding: 12px 5px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .type-name { font-weight: 800; color: #333; text-align: left; font-size: 0.9rem; padding-left: 10px !important; }
        .old-p { font-size: 0.8rem; color: #adb5bd; text-decoration: line-through; display: block; margin-bottom: 2px; }
        .new-p { font-weight: 900; color: var(--letus-orange); font-size: 1rem; }
        
        .price-notice-box { margin-top: 20px; padding: 15px; background: #fff; border-radius: 12px; text-align: left; font-size: 0.85rem; color: #666; line-height: 1.6; border-left: 4px solid var(--letus-orange); word-break: keep-all; }

        .ticket-badge { display: inline-block; background: #fff0ed; color: var(--letus-orange); padding: 8px 20px; border-radius: 50px; font-weight: 900; font-size: 1rem; margin-bottom: 15px; }
        .cta-link { display: inline-block; margin-top: 15px; padding: 15px 40px; background: var(--text-dark); color: white; text-decoration: none; border-radius: 60px; font-weight: 900; font-size: 1.1rem; transition: 0.3s; word-break: keep-all;}
        .cta-link:hover { transform: scale(1.03); }

        svg { width: 100%; height: 100%; display: block; }
        .stain-group { cursor: pointer; }
        .hitbox { fill: transparent; pointer-events: all; stroke: transparent; stroke-width: 30px; }
        .stain-art { transition: all 0.5s ease-out; pointer-events: none; transform-origin: center; }
        .found .stain-art { opacity: 0 !important; transform: scale(0) rotate(20deg); }
        .sparkle { position: absolute; pointer-events: none; animation: sparkleAni 0.7s forwards; font-size: 40px; z-index: 1000; }
        @keyframes sparkleAni { 0% { transform: scale(0); opacity: 1; } 60% { transform: scale(1.6) translateY(-25px); opacity: 1; } 100% { transform: scale(1) translateY(-60px) rotate(20deg); opacity: 0; } }

        /* 🔥 모바일 전용 스타일 완벽 최적화 */
        @media (max-width: 768px) {
            #opening-screen { padding: 15px; }
            /* 모바일 화면 너비에 맞춰 글씨가 자동으로 작아짐 (6.5vw) */
            #opening-screen h1 { font-size: 6.5vw; letter-spacing: -1px; }
            #opening-screen p { font-size: 1rem; margin: 20px 0 35px; line-height: 1.5; }
            .start-btn { padding: 15px 50px; font-size: 1.3rem; }

            .status-bar h2 { font-size: 1.3rem !important; }
            .status-bar div { font-size: 1rem !important; }
            .modal-card { padding: 30px 20px; }
            .modal-card h2 { font-size: 1.8rem !important; }
        }
    </style>
</head>
<body>

    <div id="opening-screen">
        <h1>🫧사무실 먼지 소멸 대작전🫧</h1>
        <p>사무실 곳곳에 숨은 8개의 오염을 찾아 소멸시켜주세요!<br>
           <span class="highlight-text">미션을 완수하고 비밀 혜택가를 직접 확인하세요.</span><br>
           참여하신 모든 분께 구독자 전용 '파격 할인 이벤트' 응모 기회를 드립니다.</p>
        <button class="start-btn" onclick="handleStart()">GAME START</button>
    </div>

    <div id="game-main">
        <div class="status-bar">
            <h2 style="margin:0; color:#333; font-weight: 900;">🔍 보이지 않는 오염 8곳을 찾아라!</h2>
            <div class="timer-bg"><div id="timer-fill"></div></div>
            <div style="font-size: 1.2rem; font-weight: bold; color: #444;">
                남은 오염: <span id="count-num" style="color:var(--letus-orange); font-weight: 900; font-size: 1.5rem;">8</span> / 8 | 시간: <span id="time-txt">03:00</span>
            </div>
        </div>
        <div class="game-container">
            <div class="canvas"><div class="label" style="background:#808e9b;">CLEAN OFFICE</div><svg id="clean-svg" viewBox="0 0 600 500"></svg></div>
            <div class="canvas" id="dirty-canvas"><div class="label" style="background:var(--dust-red)">DIRTY OFFICE (터치!)</div><svg id="dirty-svg" viewBox="0 0 600 500"></svg></div>
        </div>
    </div>

    <div id="result-modal"><div class="modal-card" id="modal-content-box"></div></div>

    <script>
        const officeSVG = `
            <defs>
                <clipPath id="windowClip"><rect x="355" y="45" width="170" height="120" rx="8"/></clipPath>
                <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#81d4fa"/><stop offset="100%" stop-color="#e1f5fe"/>
                </linearGradient>
            </defs>
            <rect width="600" height="500" fill="#fcfcfc"/><rect y="380" width="600" height="120" fill="#cfd8dc"/>
            <rect x="350" y="40" width="180" height="130" rx="10" fill="#fff" stroke="#b0bec5" stroke-width="4"/>
            <g clip-path="url(#windowClip)">
                <rect x="355" y="45" width="170" height="120" fill="url(#skyGrad)"/>
                <path d="M355 165 L410 100 L460 140 L525 80 L525 165 Z" fill="#4caf50" opacity="0.6"/>
                <path d="M380 165 L440 120 L500 150 L530 110 L530 165 Z" fill="#2e7d32" opacity="0.8"/>
            </g>
            <rect x="50" y="410" width="500" height="75" rx="35" fill="#eceff1"/>
            <rect x="40" y="260" width="240" height="12" rx="4" fill="#a1887f"/>
            <rect x="55" y="272" width="12" height="138" fill="#795548"/>
            <rect x="255" y="272" width="12" height="138" fill="#795548"/>
            <rect x="180" y="320" width="70" height="90" rx="5" fill="#ced4da"/>
            <rect x="80" y="190" width="100" height="60" rx="5" fill="#333"/>
            <rect x="85" y="195" width="90" height="50" rx="3" fill="#263238"/>
            <rect x="210" y="225" width="30" height="35" rx="5" fill="#d4a373"/>
            <g fill="#43a047">
                <path d="M215 225 Q200 190 225 180 Q250 190 225 225 Z"/>
                <path d="M225 225 Q240 185 260 195 Q250 215 225 225 Z" fill="#2e7d32"/>
                <path d="M225 225 Q210 185 190 195 Q200 215 225 225 Z" fill="#66bb6a"/>
            </g>
            <rect x="70" y="280" width="100" height="25" rx="10" fill="#212529"/>
            <rect x="85" y="210" width="70" height="75" rx="15" fill="#212529"/>
            <rect x="115" y="305" width="10" height="105" fill="#495057"/>
            <rect x="320" y="270" width="230" height="120" rx="20" fill="#495057"/><rect x="320" y="340" width="230" height="50" rx="10" fill="#343a40"/>
        `;

        const stainsSVG = `
            <g class="stain-group">
                <rect class="hitbox" x="350" y="415" width="150" height="60"/>
                <g class="stain-art" opacity="0.5">
                    <circle cx="400" cy="445" r="15" fill="#795548"/>
                    <circle cx="415" cy="455" r="8" fill="#795548"/>
                    <circle cx="385" cy="440" r="10" fill="#795548"/>
                    <circle cx="425" cy="445" r="5" fill="#795548"/>
                </g>
            </g>
            <g class="stain-group">
                <rect class="hitbox" x="320" y="340" width="120" height="50"/>
                <ellipse class="stain-art" cx="380" cy="365" rx="35" ry="15" fill="#90caf9" opacity="0.3"/>
            </g>
            <g class="stain-group">
                <rect class="hitbox" x="85" y="195" width="90" height="50"/>
                <ellipse class="stain-art" cx="130" cy="220" rx="15" ry="20" fill="#fff" opacity="0.15"/>
            </g>
            <g class="stain-group">
                <rect class="hitbox" x="355" y="45" width="170" height="120"/>
                <rect class="stain-art" x="360" y="155" width="160" height="8" fill="#607d8b" opacity="0.6"/>
            </g>
            <g class="stain-group">
                <rect class="hitbox" x="80" y="410" width="150" height="70"/>
                <g class="stain-art" opacity="0.5">
                    <circle cx="110" cy="445" r="4" fill="#90a4ae"/><circle cx="160" cy="455" r="6" fill="#90a4ae"/><circle cx="210" cy="440" r="5" fill="#90a4ae"/>
                </g>
            </g>
            <g class="stain-group">
                <rect class="hitbox" x="40" y="240" width="60" height="40"/>
                <circle class="stain-art" cx="70" cy="255" r="14" fill="none" stroke="#5d4037" stroke-width="3" opacity="0.4"/>
            </g>
            <g class="stain-group">
                <rect class="hitbox" x="85" y="210" width="70" height="75"/>
                <ellipse class="stain-art" cx="120" cy="245" rx="15" ry="25" fill="#4e342e" opacity="0.6"/>
            </g>
            <g class="stain-group">
                <rect class="hitbox" x="210" y="225" width="30" height="35"/>
                <circle class="stain-art" cx="240" cy="250" r="8" fill="#fbc02d" opacity="0.6"/>
            </g>
        `;

        document.getElementById('clean-svg').innerHTML = officeSVG;
        document.getElementById('dirty-svg').innerHTML = officeSVG + stainsSVG;

        let foundCount = 0; let timeLeft = 180; let timerId = null;
        function handleStart() { document.getElementById('opening-screen').style.display = 'none'; document.getElementById('game-main').style.display = 'flex'; startTimer(); }
        function startTimer() { timerId = setInterval(() => { timeLeft--; const min = Math.floor(timeLeft / 60); const sec = timeLeft % 60; document.getElementById('time-txt').innerText = `${min}:${sec < 10 ? '0' + sec : sec}`; document.getElementById('timer-fill').style.width = (timeLeft / 180) * 100 + '%'; if (timeLeft <= 0) { clearInterval(timerId); showResult(false); } }, 1000); }
        
        document.querySelectorAll('#dirty-svg .stain-group').forEach(el => { 
            el.addEventListener('pointerdown', function(e) { 
                if (this.classList.contains('found')) return; 
                this.classList.add('found'); foundCount++; 
                document.getElementById('count-num').innerText = 8 - foundCount; 
                const sparkle = document.createElement('div'); sparkle.className = 'sparkle'; sparkle.innerText = '🫧'; 
                sparkle.style.left = e.pageX + 'px'; sparkle.style.top = e.pageY + 'px'; 
                document.body.appendChild(sparkle); setTimeout(() => sparkle.remove(), 700); 
                if (foundCount === 8) { clearInterval(timerId); setTimeout(() => showResult(true), 600); } 
            }); 
        });

        function showResult(isWin) {
            document.getElementById('result-modal').style.display = 'flex';
            const modalBox = document.getElementById('modal-content-box');
            const priceTable = `
                <div class="price-table-container">
                    <p style="font-weight:900; color:var(--letus-orange); margin-bottom:10px; font-size:1.1rem; text-align:left;">[구독자 전용 수량별 시크릿 할인가]</p>
                    <table class="price-table">
                        <thead><tr><th>에어컨 타입</th><th>6~10대</th><th>11~20대</th></tr></thead>
                        <tbody>
                            <tr><td class="type-name">벽걸이형</td><td><span class="old-p">8.5만</span><span class="new-p">70,000원</span></td><td><span class="old-p">8.5만</span><span class="new-p">70,000원</span></td></tr>
                            <tr><td class="type-name">천장형 1·2Way</td><td><span class="old-p">11만</span><span class="new-p">90,000원</span></td><td><span class="old-p">11만</span><span class="new-p">80,000원</span></td></tr>
                            <tr><td class="type-name">천장형 4Way</td><td><span class="old-p">14만</span><span class="new-p">120,000원</span></td><td><span class="old-p">14만</span><span class="new-p">110,000원</span></td></tr>
                        </tbody>
                    </table>
                    <div class="price-notice-box">
                        • 본 혜택은 <b>최소 2대 이상</b>부터 작업 가능합니다.<br>
                        • <b>5대 이하 소량 주문 건</b>도 6~10대 구간 할인가를 동일하게 적용해 드립니다.<br>
                        • 더욱 자세한 내용은 <b>레터스 공식 홈페이지</b>를 이용해 주세요.
                    </div>
                </div>
            `;
            const commonMsg = `<p style="font-size: 1.1rem; line-height: 1.6; color: #333; word-break: keep-all;">당첨 결과는 기재해 주신 <b>이메일로 개별 안내</b> 드릴 예정이니 조금만 기다려 주세요!<br>상쾌한 오피스를 위한 가장 스마트한 준비, 레터스가 함께합니다.</p>`;
            
            if (isWin) {
                modalBox.innerHTML = `<div class="ticket-badge">MISSION COMPLETE 🎫</div><h2 style="font-size: 2.3rem; color: var(--letus-orange); margin-top:0; font-weight: 900;">🌟소멸 완료🌟<br>혜택을 확인하세요</h2>${commonMsg}${priceTable}<a href="https://www.letus4u.com/" target="_blank" class="cta-link">레터스 공식 홈페이지 문의하기 ✅</a>`;
            } else {
                modalBox.innerHTML = `<div class="ticket-badge">LUCKY DRAW ENTRY 🎫</div><h2 style="font-size: 2.3rem; color: var(--dust-red); margin-top:0; font-weight: 900;">아쉽지만 혜택은 유효해요!</h2>${commonMsg}${priceTable}<div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;"><a href="https://www.letus4u.com/" target="_blank" class="cta-link" style="flex:1; min-width:150px;">문의하기</a><a href="#" class="cta-link" style="flex:1; min-width:150px; background:white; color:#1a1a1a; border:2px solid #1a1a1a;" onclick="location.reload()">다시 도전</a></div>`;
            }
        }
    </script>
</body>
</html>
